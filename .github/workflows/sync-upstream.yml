name: Sync Upstream Repository

on:
  workflow_dispatch:
    inputs:
      upstream_branch:
        description: "Upstream branch to sync"
        required: true
        default: "master"
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream-${{ github.event.repository.default_branch }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream branch into sync branch
        id: merge
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
          UPSTREAM_REPO: https://github.com/sansan0/TrendRadar.git
        run: |
          set -euo pipefail

          SYNC_BRANCH="codex/sync-upstream-${UPSTREAM_BRANCH}"

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "$UPSTREAM_REPO"
          else
            git remote add upstream "$UPSTREAM_REPO"
          fi

          git fetch origin "$DEFAULT_BRANCH"
          git fetch upstream "$UPSTREAM_BRANCH"
          git checkout -B "$SYNC_BRANCH" "origin/$DEFAULT_BRANCH"

          if ! git merge --no-edit "upstream/$UPSTREAM_BRANCH"; then
            git merge --abort || true
            echo "Failed to merge upstream/$UPSTREAM_BRANCH into $SYNC_BRANCH" >&2
            exit 1
          fi

          if git diff --quiet "origin/$DEFAULT_BRANCH"...HEAD; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "sync_branch=$SYNC_BRANCH" >> "$GITHUB_OUTPUT"
            echo "No upstream changes to sync."
            exit 0
          fi

          git push --force-with-lease origin "$SYNC_BRANCH"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "sync_branch=$SYNC_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create or update sync PR
        if: steps.merge.outputs.has_changes == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          SYNC_BRANCH: ${{ steps.merge.outputs.sync_branch }}
          UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
        run: |
          set -euo pipefail

          TITLE="Sync upstream/${UPSTREAM_BRANCH} into ${DEFAULT_BRANCH}"
          BODY=$(cat <<EOF
          This PR syncs the latest changes from \`sansan0/TrendRadar:${UPSTREAM_BRANCH}\` into \`${DEFAULT_BRANCH}\`.

          Notes:
          - Generated by the \`Sync Upstream Repository\` workflow
          - Review the diff before merging
          - Deploy to production separately after merge
          EOF
          )

          PR_URL=$(gh pr list \
            --base "$DEFAULT_BRANCH" \
            --head "$SYNC_BRANCH" \
            --state open \
            --json url \
            --jq '.[0].url // empty')

          if [ -n "$PR_URL" ]; then
            gh pr edit "$PR_URL" --title "$TITLE" --body "$BODY" >/dev/null
          else
            PR_URL=$(gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$SYNC_BRANCH" \
              --title "$TITLE" \
              --body "$BODY")
          fi

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Write workflow summary
        env:
          HAS_CHANGES: ${{ steps.merge.outputs.has_changes }}
          SYNC_BRANCH: ${{ steps.merge.outputs.sync_branch }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          set -euo pipefail

          if [ "$HAS_CHANGES" = "true" ]; then
            {
              echo "## Upstream sync ready"
              echo
              echo "- Sync branch: \`$SYNC_BRANCH\`"
              echo "- Pull request: $PR_URL"
              echo "- Next step: review and merge the PR, then run the production deploy workflow"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Upstream sync skipped"
              echo
              echo "- No changes were found between upstream and the current default branch"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
